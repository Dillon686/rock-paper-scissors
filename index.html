<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Rock, Paper, Scissors</h1>
    <div id="game-container">
      <div id="button-container">
        <button class="selection"><img src="rock.png" class="icon"></img></button>
        <button class="selection"><img src="paper.png" class="icon"></img></button>
        <button class="selection"><img src="scissors.png" class="icon"></img></button>
      </div>
      <div id="results-container">
        <div class="results-div" id="wins">WINS:</div>
        <div class="results-div" id="losses">LOSSES:</div>
        <div class="results-div" id="output">Result Window</div>
      </div>
    </div>
</body>
</html>
